# ─────────────────────────────────────────────────────────
#  AVIORA — host nginx reverse proxy (mavjud nginx ichiga qo'shiladi)
#  Joylashuv:  /etc/nginx/sites-available/aviora.conf
#  Yoqish:     ln -s /etc/nginx/sites-available/aviora.conf /etc/nginx/sites-enabled/
#
#  Bu name-based virtual host — serverdagi BOSHQA saytlarga xalaqit qilmaydi.
#  SSL (443) bloklarini certbot avtomatik qo'shadi:
#     sudo certbot --nginx -d boshqaruv.aviorahr.uz -d apiboshqaruv.aviorahr.uz
#  Docker konteynerlari faqat 127.0.0.1 da: frontend=9000, backend=9001.
# ─────────────────────────────────────────────────────────

# ── Frontend (React SPA) ──
server {
    listen 80;
    listen [::]:80;
    server_name boshqaruv.aviorahr.uz;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Backend (NestJS API + Socket.io + /uploads) ──
server {
    listen 80;
    listen [::]:80;
    server_name apiboshqaruv.aviorahr.uz;

    client_max_body_size 50M;   # fayl yuklash uchun

    location / {
        proxy_pass http://127.0.0.1:9001;

        # WebSocket (socket.io real-time bildirishnomalar) uchun shart:
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
