# ─────────────────────────────────────────────────────────
#  AVIORA — host nginx reverse proxy (mavjud nginx ichiga qo'shiladi)
#  Joylashuv:  /etc/nginx/sites-available/aviora.conf
#  Yoqish:     ln -s /etc/nginx/sites-available/aviora.conf /etc/nginx/sites-enabled/
#
#  BITTA DOMEN, path orqali ajratilgan:
#     Frontend (SPA)        →  https://avioraerp.asosit.uz/
#     Backend  (REST API)   →  https://avioraerp.asosit.uz/api
#     Yuklangan fayllar     →  https://avioraerp.asosit.uz/uploads/...
#     Socket.io (real-time) →  https://avioraerp.asosit.uz/socket.io/
#
#  Bu name-based virtual host — serverdagi BOSHQA saytlarga xalaqit qilmaydi.
#  SSL (443) blokini certbot avtomatik qo'shadi:
#     sudo certbot --nginx -d avioraerp.asosit.uz
#  Docker konteynerlari faqat 127.0.0.1 da: frontend=9000, backend=9001.
# ─────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name avioraerp.asosit.uz;

    client_max_body_size 50M;   # fayl yuklash uchun

    # ── Backend REST API ──
    location /api/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Yuklangan fayllar (statik, backend beradi) ──
    location /uploads/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Socket.io (real-time bildirishnomalar, WebSocket) ──
    location /socket.io/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Frontend (React SPA) — qolgan hamma narsa ──
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
