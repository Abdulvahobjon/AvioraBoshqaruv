services:
  postgres:
    image: postgres:16-alpine
    container_name: aviora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aviora
    ports:
      - "5432:5432"
    volumes:
      - aviora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aviora"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aviora-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aviora?schema=public
      JWT_ACCESS_SECRET: docker-access-secret
      JWT_REFRESH_SECRET: docker-refresh-secret
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_DIR: uploads
      SEED_DEFAULT_PASSWORD: Aviora2026!
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: aviora-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  aviora_pg_data:
