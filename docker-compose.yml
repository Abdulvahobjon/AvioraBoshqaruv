# ─────────────────────────────────────────────────────────
#  AVIORA — Server deploy (Docker Compose)
#  Reverse-proxy: serverdagi MAVJUD host nginx (80/443 band).
#  BITTA DOMEN, path orqali ajratilgan:
#  Frontend → https://avioraerp.asosit.uz        (host nginx → 127.0.0.1:9000)
#  Backend  → https://avioraerp.asosit.uz/api    (host nginx → 127.0.0.1:9001)
#  Postgres → faqat ichki tarmoq (host portga chiqmaydi).
#  SSL: certbot (Let's Encrypt) host nginx orqali.
#  Ishga tushirish:  docker compose up -d --build
# ─────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: aviora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aviora
    volumes:
      - aviora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aviora"]
      interval: 5s
      timeout: 5s
      retries: 10
    # ports ataylab yo'q — DB faqat ichki tarmoqda (xost 5432 boshqa ilova bilan band)

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aviora-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aviora?schema=public
      JWT_ACCESS_SECRET: "5ae5d318f8c89e5e1734c3fb97d4e68fdd444c9ef3aafa3d789e0d84c7840b5a"
      JWT_REFRESH_SECRET: "b59d4545c46fbbab4ad37cd858115549d84600e2cdaa20a51e649bc2de7474b8"
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: https://avioraerp.asosit.uz
      UPLOAD_DIR: uploads
      SEED_DEFAULT_PASSWORD: Aviora2026!
      # ── Google Meet (ixtiyoriy — yoqmoqchi bo'lsangiz izohni oching va to'ldiring) ──
      # GOOGLE_CLIENT_ID: "571124877992-...apps.googleusercontent.com"
      # GOOGLE_CLIENT_SECRET: "GOCSPX-..."
      # GOOGLE_REDIRECT_URI: "http://157.180.46.214:5050/oauth2callback"
      # GOOGLE_TIMEZONE: "Asia/Tashkent"
      # GOOGLE_REFRESH_TOKEN_ASOSITLLM: "1//0..."
    volumes:
      - aviora_uploads:/app/uploads
    # Faqat localhost'ga ochamiz — host nginx 127.0.0.1:9001 orqali ulanadi (tashqaridan to'g'ridan-to'g'ri kirib bo'lmaydi)
    ports:
      - "127.0.0.1:9001:3000"
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://avioraerp.asosit.uz
    container_name: aviora-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Faqat localhost'ga ochamiz — host nginx 127.0.0.1:9000 orqali ulanadi
    ports:
      - "127.0.0.1:9000:80"

volumes:
  aviora_pg_data:
  aviora_uploads:
