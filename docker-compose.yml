# ─────────────────────────────────────────────────────────
#  AVIORA — Server deploy (Docker Compose)
#  Reverse-proxy: serverdagi MAVJUD host nginx (80/443 band).
#  BITTA DOMEN, path orqali ajratilgan:
#  Frontend → https://avioraerp.asosit.uz        (host nginx → 127.0.0.1:9000)
#  Backend  → https://avioraerp.asosit.uz/api    (host nginx → 127.0.0.1:9001)
#  Postgres → faqat ichki tarmoq (host portga chiqmaydi).
#  SSL: certbot (Let's Encrypt) host nginx orqali.
#  Ishga tushirish:  docker compose up -d --build
# ─────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: aviora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Parol git'ga kommit qilinmaydi — root `.env` faylidan olinadi (namuna: .env.docker.example).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env faylida belgilanishi shart}
      POSTGRES_DB: aviora
    volumes:
      - aviora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aviora"]
      interval: 5s
      timeout: 5s
      retries: 10
    # ports ataylab yo'q — DB faqat ichki tarmoqda (xost 5432 boshqa ilova bilan band)

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aviora-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Maxfiy qiymatlar git'ga kommit QILINMAYDI — root `.env` faylidan o'qiladi (namuna: .env.docker.example).
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?belgilang}@postgres:5432/aviora?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET .env faylida belgilanishi shart}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET .env faylida belgilanishi shart}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://avioraerp.asosit.uz}
      UPLOAD_DIR: uploads
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:?SEED_DEFAULT_PASSWORD .env faylida belgilanishi shart}
    # ── Google Meet (Calendar API) ──
    # Sirlar git'ga kommit qilinmaydi. Serverda `google-meet.env` faylini yarating
    # (namuna: google-meet.env.example) va GOOGLE_* qiymatlarni to'ldiring.
    # Fayl bo'lmasa backend baribir ishlaydi, faqat Meet havolasi yaratilmaydi
    # (required: false — Docker Compose v2.24+ kerak).
    env_file:
      - path: ./google-meet.env
        required: false
    volumes:
      - aviora_uploads:/app/uploads
    # Faqat localhost'ga ochamiz — host nginx 127.0.0.1:9001 orqali ulanadi (tashqaridan to'g'ridan-to'g'ri kirib bo'lmaydi)
    ports:
      - "127.0.0.1:9001:3000"
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://avioraerp.asosit.uz
    container_name: aviora-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Faqat localhost'ga ochamiz — host nginx 127.0.0.1:9000 orqali ulanadi
    ports:
      - "127.0.0.1:9000:80"

volumes:
  aviora_pg_data:
  aviora_uploads:
