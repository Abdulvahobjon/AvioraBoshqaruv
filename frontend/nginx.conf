server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed assetlar — nom ichida content-hash bor, abadiy keshlanadi.
  # Yo'q bo'lsa =404 (SPA fallback EMAS) — eski chunk so'ralganda text/html emas, toza 404 qaytadi.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html — hech qachon keshlanmaydi: brauzer doim joriy (yangi) chunk nomlarini oladi.
  # Shu sabab yangi deploy'dan keyin "Failed to fetch dynamically imported module" bo'lmaydi.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback — qolgan yo'llar index.html ga.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API to backend container
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # Yuklangan fayllar (backend beradi)
  location /uploads/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Socket.io (real-time bildirishnomalar) — WebSocket upgrade SHART
  location /socket.io/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }
}
